<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Carrito de compras</title>
</head>
<body>
    <div class="titulo">
        <h1>🛒 Mi carrito de compras</h1>
    </div>

    <div class="contenedor">
        <div class="productos">
            <h2>Productos</h2>
            <div class="contenedor-producto">
                <h3>☕️ Cafe</h3>
                <p>Tostado</p>
                <p class="precio-producto">$20</p>
                <button class="btn-agregar">Agregar</button>
            </div>
            <div class="contenedor-producto">
                <h3>🍎 Manzana</h3>
                <p>Sabrosa</p>
                <p class="precio-producto">$10</p>
                <button class="btn-agregar">Agregar</button>
            </div>
            <div class="contenedor-producto">
                <h3>🧀 Queso</h3>
                <p>Fresco</p>
                <p class="precio-producto">$15</p>
                <button class="btn-agregar">Agregar</button>
            </div>
            <div class="contenedor-producto">
                <h3>🍊 Naranja</h3>
                <p>Jugosa</p>
                <p class="precio-producto">$10</p>
                <button class="btn-agregar">Agregar</button>
            </div>
        </div>
        <div class="carrito">
            <h2>Carrito</h2>
            <div id="producto-carrito"></div>
            <hr>
            <p id="total-carrito">Total: </p>
            <button class="btn-carrito">Vaciar carrito</button>
        </div>

    </div>
    <div class="nuevo-boton">
        <button id="btn-sorpresa">Presionar Susan</button>

        <div id="info" class="oculto">
            <img src="IMG_4086 2.jpg" alt="">
            <h2>Te amo mucho mi bebe ❤️ </h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
